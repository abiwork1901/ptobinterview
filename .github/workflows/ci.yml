name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Start infra dependencies
        run: docker compose up -d postgres zookeeper kafka

      - name: Run unit tests
        run: mvn -B test

      - name: Stop compose stack
        if: always()
        run: docker compose down -v
