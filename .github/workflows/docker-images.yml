name: docker-images

on:
  workflow_dispatch:
    inputs:
      push_images:
        description: "Push built images to GHCR"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      REGISTRY: ghcr.io
      IMAGE_PREFIX: ${{ github.repository_owner }}/ptob
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all images locally
        run: ./scripts/ci/build-images.sh

      - name: Log in to GHCR
        if: github.event_name == 'push' || inputs.push_images == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push images to GHCR
        if: github.event_name == 'push' || inputs.push_images == 'true'
        run: ./scripts/ci/push-images-ghcr.sh "${REGISTRY}" "${IMAGE_PREFIX}" "${GITHUB_SHA}"
