apiVersion: apps/v1
kind: Deployment
metadata:
  name: ptob-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ptob-web
  template:
    metadata:
      labels:
        app: ptob-web
    spec:
      containers:
        - name: web
          image: ptob/react-ts-app:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
