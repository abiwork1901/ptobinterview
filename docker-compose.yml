services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ptob
      POSTGRES_USER: ptob
      POSTGRES_PASSWORD: ptob
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ptob -d ptob"]
      interval: 10s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ptob
      DB_USER: ptob
      DB_PASSWORD: ptob
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      APP_KAFKA_ENABLED: "true"
      APP_BEARER_TOKEN: local-dev-token
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  web-react:
    build:
      context: ./react-ts-app
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
    ports:
      - "5173:80"
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          cpus: "0.10"
          memory: 64M

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    restart: unless-stopped
    depends_on:
      - kafka
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  kotlin-client:
    build:
      context: ./kotlin-app
      dockerfile: Dockerfile
    depends_on:
      app:
        condition: service_started
    profiles:
      - clients

  flutter-web:
    build:
      context: ./flutter-app
      dockerfile: Dockerfile.web
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
    ports:
      - "8088:80"
    profiles:
      - flutter

  trading-service:
    image: ptob/trading-service:local
    build:
      context: .
      dockerfile: Dockerfile.microservice
      args:
        SERVICE_NAME: trading-service
        SERVICE_PORT: 8080
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "8091:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ptob
      DB_USER: ptob
      DB_PASSWORD: ptob
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      APP_KAFKA_ENABLED: "false"
      APP_BEARER_TOKEN: local-dev-token
      APP_SERVICE_ROLE: trading-service
      JAVA_OPTS: "-Xms64m -Xmx160m -XX:MaxMetaspaceSize=96m -XX:+UseSerialGC -XX:+UseContainerSupport"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s
    profiles:
      - algo-microservices

